<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Анализ запроса — Балтийский Берег</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<style>
  [x-cloak]{display:none!important}
  .fade-in{animation:fadeIn .3s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
  pre{white-space:pre-wrap;word-break:break-word}
</style>
</head>
<body class="bg-slate-50 min-h-screen text-gray-800" x-data="analysisPage()">

<header class="bg-white border-b border-gray-200 px-8 py-4 flex items-center gap-4">
  <a href="/" class="text-gray-400 hover:text-blue-600 transition-colors flex-shrink-0">
    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
    </svg>
  </a>
  <div class="flex-1">
    <div class="text-base font-semibold text-gray-900 leading-tight">Анализ запроса</div>
    <div class="text-xs text-gray-400 mt-0.5" x-text="data ? formatDate(data.created_at) : '...'"></div>
  </div>
  <span class="text-xs text-gray-300 font-mono" x-text="aid"></span>
</header>

<div class="max-w-5xl mx-auto px-6 py-6" x-show="!data && !error">
  <div class="text-center py-20 text-gray-400">
    <div class="animate-spin w-8 h-8 border-2 border-blue-500 border-t-transparent rounded-full mx-auto mb-4"></div>
    Загружаю анализ...
  </div>
</div>

<div class="max-w-5xl mx-auto px-6 py-6" x-show="error" x-cloak>
  <div class="bg-red-50 border border-red-200 rounded-lg p-6 text-center">
    <p class="text-red-600 text-sm" x-text="error"></p>
    <a href="/" class="mt-3 inline-block text-sm text-blue-600 hover:underline">← Вернуться к списку</a>
  </div>
</div>

<div class="max-w-5xl mx-auto px-6 py-6 space-y-4 fade-in" x-show="data" x-cloak>

  <!-- Вопрос -->
  <div class="bg-white rounded-lg border border-gray-200 p-6">
    <div class="flex items-start justify-between gap-4">
      <div class="flex-1">
        <div class="text-xs font-medium text-gray-400 uppercase tracking-wide mb-2">Вопрос сотрудника</div>
        <div class="text-lg font-semibold text-gray-900" x-text="data?.question"></div>
      </div>
      <div class="flex flex-col items-end gap-2 flex-shrink-0">
        <span class="px-3 py-1 rounded text-xs font-medium"
          :class="data?.escalated ? 'bg-orange-100 text-orange-700' : 'bg-emerald-100 text-emerald-700'"
          x-text="data?.escalated ? 'Эскалация' : 'Решено автоматически'">
        </span>
        <span class="text-xs text-gray-400"
          x-text="data?.source === 'telegram' ? 'Telegram' : 'Web'">
        </span>
      </div>
    </div>
  </div>

  <!-- Классификация + тайминги -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
    <div class="bg-white rounded-lg border border-gray-200 p-4">
      <div class="text-xs text-gray-400 mb-1">Категория</div>
      <div class="font-medium text-sm text-gray-800" x-text="data?.classification?.service || '—'"></div>
    </div>
    <div class="bg-white rounded-lg border border-gray-200 p-4">
      <div class="text-xs text-gray-400 mb-1">Приоритет</div>
      <div class="font-medium text-sm"
        :class="{
          'text-red-600': data?.classification?.priority === 'Критичный',
          'text-orange-500': data?.classification?.priority === 'Высокий',
          'text-yellow-600': data?.classification?.priority === 'Средний',
          'text-emerald-600': data?.classification?.priority === 'Низкий',
        }"
        x-text="data?.classification?.priority || '—'">
      </div>
    </div>
    <div class="bg-white rounded-lg border border-gray-200 p-4">
      <div class="text-xs text-gray-400 mb-1">Общее время</div>
      <div class="font-semibold text-sm text-blue-600" x-text="data?.timing?.total_ms + ' мс'"></div>
    </div>
    <div class="bg-white rounded-lg border border-gray-200 p-4">
      <div class="text-xs text-gray-400 mb-1">Статус</div>
      <div class="font-medium text-sm"
        :class="data?.escalated ? 'text-orange-500' : 'text-emerald-600'"
        x-text="data?.escalated ? 'Нужен оператор' : 'Автоответ'">
      </div>
    </div>
  </div>

  <!-- Ответ -->
  <div class="bg-white rounded-lg border border-gray-200 p-6">
    <div class="text-sm font-medium text-gray-700 mb-3">Ответ модели</div>
    <div class="bg-slate-50 rounded-md border border-gray-100 p-4 text-sm text-gray-700 leading-relaxed" x-text="data?.answer"></div>
  </div>

  <!-- Распределение времени -->
  <div class="bg-white rounded-lg border border-gray-200 p-6">
    <div class="text-sm font-medium text-gray-700 mb-4">Распределение времени обработки</div>
    <div class="flex rounded-md overflow-hidden h-6">
      <div class="bg-violet-500 transition-all"
        :style="`width:${Math.round((data?.timing?.search_ms / data?.timing?.total_ms)*100)}%`">
      </div>
      <div class="bg-indigo-500 transition-all"
        :style="`width:${Math.round((data?.timing?.llm_ms / data?.timing?.total_ms)*100)}%`">
      </div>
    </div>
    <div class="flex gap-6 mt-3 text-xs text-gray-500">
      <span class="flex items-center gap-1.5">
        <span class="w-2.5 h-2.5 rounded-sm bg-violet-500 flex-shrink-0"></span>
        Поиск ChromaDB — <strong x-text="data?.timing?.search_ms + ' мс'"></strong>
      </span>
      <span class="flex items-center gap-1.5">
        <span class="w-2.5 h-2.5 rounded-sm bg-indigo-500 flex-shrink-0"></span>
        YandexGPT — <strong x-text="data?.timing?.llm_ms + ' мс'"></strong>
      </span>
      <span class="text-gray-400">
        Итого: <strong class="text-gray-600" x-text="data?.timing?.total_ms + ' мс'"></strong>
      </span>
    </div>
  </div>

  <!-- Фрагменты -->
  <div class="bg-white rounded-lg border border-gray-200 p-6">
    <div class="flex items-center justify-between mb-4">
      <div class="text-sm font-medium text-gray-700">Найденные фрагменты</div>
      <div class="flex gap-4 text-xs text-gray-400">
        <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-violet-400"></span>KB-статья</span>
        <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-amber-400"></span>Решение</span>
        <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-cyan-400"></span>Тикет</span>
      </div>
    </div>

    <div class="space-y-2">
      <template x-for="chunk in data?.chunks" :key="chunk.rank">
        <div class="border rounded-md overflow-hidden"
          :class="chunk.rank === 1 ? 'border-blue-200' : 'border-gray-100'">

          <div class="flex items-center gap-3 px-4 py-2.5 cursor-pointer hover:bg-slate-50 transition-colors"
            :class="chunk.rank === 1 ? 'bg-blue-50' : 'bg-white'"
            @click="chunk.expanded = !chunk.expanded">

            <span class="text-xs font-bold text-gray-400 w-4 flex-shrink-0" x-text="chunk.rank"></span>

            <span class="text-xs px-2 py-0.5 rounded font-medium border flex-shrink-0"
              :class="chunk.source === 'kb' ? 'border-violet-200 bg-violet-50 text-violet-700' :
                      chunk.source === 'expense' ? 'border-amber-200 bg-amber-50 text-amber-700' :
                      'border-cyan-200 bg-cyan-50 text-cyan-700'"
              x-text="chunk.source === 'kb' ? 'KB-статья' : chunk.source === 'expense' ? 'Решение' : 'Тикет'">
            </span>

            <span class="text-sm text-gray-700 flex-1 truncate" x-text="chunk.title || '(без заголовка)'"></span>

            <span class="text-sm font-semibold font-mono flex-shrink-0"
              :class="chunk.score > 0.7 ? 'text-emerald-600' : chunk.score > 0.5 ? 'text-yellow-600' : 'text-red-500'"
              x-text="(chunk.score * 100).toFixed(1) + '%'">
            </span>

            <svg class="w-4 h-4 text-gray-400 transition-transform flex-shrink-0"
              :class="chunk.expanded ? 'rotate-180' : ''"
              fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
          </div>

          <div x-show="chunk.expanded" x-cloak class="border-t border-gray-100 px-4 py-4 bg-white">
            <pre class="text-xs text-gray-600 leading-relaxed" x-text="chunk.text"></pre>
            <div x-show="chunk.service" class="mt-2 text-xs text-gray-400">
              Сервис: <span x-text="chunk.service"></span>
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>

</div>

<script>
function analysisPage() {
  return {
    aid: null,
    data: null,
    error: null,

    async init() {
      this.aid = location.pathname.split('/').pop();
      try {
        const r = await fetch(`/analyses/${this.aid}`);
        if (!r.ok) throw new Error('Анализ не найден');
        const d = await r.json();
        d.chunks = d.chunks.map(c => ({ ...c, expanded: c.rank === 1 }));
        this.data = d;
      } catch(e) {
        this.error = e.message;
      }
    },

    formatDate(iso) {
      return new Date(iso).toLocaleString('ru-RU');
    },
  }
}
</script>
</body>
</html>
